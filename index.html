<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder · 模块化简历构建器</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { -webkit-font-smoothing: antialiased; }
  body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: #f5f5f4; }
  
  /* ====== A4 真实尺寸 · CSS 变量驱动 ====== */
  .resume-page {
    /* 默认值（会被 JS 动态覆盖） */
    --margin-v: 18mm;
    --margin-h: 20mm;
    --base-font: 10.5pt;
    --line-height: 1.6;
    --section-style: bar;
    
    width: 210mm;
    height: 297mm;
    box-sizing: border-box;
    padding: var(--margin-v) var(--margin-h);
    background: white;
    font-family: 'Noto Sans SC', 'Inter', sans-serif;
    font-size: var(--base-font);
    line-height: var(--line-height);
    color: #1a1a1a;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    overflow: hidden;
    page-break-after: always;
  }
  /* 内容块：分页时不可切分 */
  .resume-page [data-block] {
    page-break-inside: avoid;
    break-inside: avoid;
  }
  /* 大标题样式 - 取决于 section-style */
  .resume-page .section-title {
    font-weight: 700;
    color: #1a1a1a;
    font-size: calc(var(--base-font) * 1.25);
    margin-top: calc(var(--base-font) * 1.4);
    margin-bottom: calc(var(--base-font) * 0.6);
  }
  /* 风格 1: 左侧蓝色竖条 */
  .resume-page[data-section-style="bar"] .section-title {
    padding-left: 10px;
    border-left: 4px solid #2563eb;
  }
  /* 风格 2: 底部横线 */
  .resume-page[data-section-style="line"] .section-title {
    padding-bottom: 4px;
    border-bottom: 1.5px solid #1a1a1a;
  }
  /* 风格 3: 仅文字 */
  .resume-page[data-section-style="plain"] .section-title {
    /* 无装饰 */
  }
  .resume-page .item-title { font-weight: 600; font-size: var(--base-font); }
  .resume-page .item-date { color: #555; font-size: var(--base-font); }
  .resume-page .tag-pill {
    display: inline-flex;
    align-items: center;
    background: #dbeafe;
    color: #1e40af;
    padding: 2px 8px;
    font-size: var(--base-font);
    line-height: 1.2;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .resume-page ul { list-style: disc; padding-left: 18px; margin-top: 4px; margin-bottom: 0; }
  .resume-page ul li { 
    margin-bottom: calc(var(--base-font) * 0.3); 
    font-size: var(--base-font); 
    line-height: var(--line-height); 
  }
  .resume-page .contact-line { color: #444; font-size: var(--base-font); }
  .resume-page a { color: #2563eb; }
  
  /* 编辑区样式 */
  .field-label { font-size: 12px; font-weight: 500; color: #525252; margin-bottom: 4px; display: block; }
  .field-input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    font-size: 13px;
    background: white;
    transition: border 0.15s;
  }
  .field-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
  .field-textarea { min-height: 70px; resize: vertical; font-family: inherit; }
  
  .btn-primary {
    background: #1a1a1a; color: white; padding: 8px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 500; transition: all 0.15s;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary {
    background: white; color: #1a1a1a; padding: 7px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500; border: 1px solid #e5e5e5; transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: #1a1a1a; }
  .btn-danger {
    color: #dc2626; padding: 4px 8px; font-size: 11px; font-weight: 500;
  }
  .btn-danger:hover { background: #fef2f2; border-radius: 4px; }
  
  /* 模块卡片 */
  .module-card {
    background: white; border: 1px solid #e5e5e5; border-radius: 8px;
    padding: 14px; margin-bottom: 10px; transition: all 0.15s;
  }
  .module-card.included { border-color: #2563eb; background: #eff6ff; }
  
  /* 标签页 */
  .tab-btn {
    padding: 10px 16px; font-size: 13px; font-weight: 500; color: #737373;
    border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s;
  }
  .tab-btn.active { color: #1a1a1a; border-bottom-color: #2563eb; }
  .tab-btn:hover { color: #1a1a1a; }
  
  /* 多页之间的间距 */
  #pages-container { display: flex; flex-direction: column; gap: 16px; }
  /* 排版控制按钮 active 态 */
  .margin-btn.active, .section-style-btn.active {
    background: #1a1a1a !important;
    color: white;
  }
  
  /* 滚动条 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }
  
  /* 打印 */
  @media print {
    body * { visibility: hidden; }
    .resume-page, .resume-page * { visibility: visible; }
    .resume-page { position: absolute; left: 0; top: 0; box-shadow: none; }
  }
  
  /* 预览缩放容器 */
  .preview-wrapper { transform-origin: top center; }
</style>
</head>
<body class="min-h-screen">

<!-- 顶栏 -->
<div class="bg-white border-b border-neutral-200 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <div class="w-7 h-7 bg-neutral-900 rounded-md flex items-center justify-center">
      <span class="text-white text-xs font-bold">R</span>
    </div>
    <div>
      <div class="text-sm font-semibold text-neutral-900">Resume Builder</div>
      <div class="text-[10px] text-neutral-500">模块化简历构建 · 本地存储</div>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <input type="file" id="import-file" accept=".pdf,.txt,.md" class="hidden" />
    <button id="import-btn" class="btn-secondary flex items-center gap-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      导入旧简历
    </button>
    <button id="save-btn" class="btn-secondary">手动保存</button>
    <button id="export-btn" class="btn-primary flex items-center gap-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      导出 PDF
    </button>
  </div>
</div>

<!-- 三栏主体 -->
<div class="flex" style="height: calc(100vh - 57px);">
  
  <!-- 左栏：原始数据库（所有经历的总库） -->
  <div class="w-[36%] bg-white border-r border-neutral-200 overflow-y-auto">
    <div class="px-5 pt-4 pb-2 border-b border-neutral-200 bg-neutral-50">
      <div class="text-xs font-semibold text-neutral-500 uppercase tracking-wide mb-2">经历总库</div>
      <div class="flex gap-0 -mb-px overflow-x-auto">
        <button class="tab-btn active" data-tab="basic">基本信息</button>
        <button class="tab-btn" data-tab="education">教育</button>
        <button class="tab-btn" data-tab="internship">实习</button>
        <button class="tab-btn" data-tab="project">项目</button>
        <button class="tab-btn" data-tab="activity">活动</button>
        <button class="tab-btn" data-tab="summary">总结</button>
      </div>
    </div>
    <div class="p-5" id="edit-area"></div>
  </div>
  
  <!-- 中栏：JD适配 + 模块勾选 -->
  <div class="w-[28%] bg-neutral-50 border-r border-neutral-200 overflow-y-auto">
    <div class="px-5 pt-4 pb-3 border-b border-neutral-200 bg-white">
      <div class="text-xs font-semibold text-neutral-500 uppercase tracking-wide">模块勾选</div>
      <div class="text-[11px] text-neutral-400 mt-1">从经历总库里挑选要放入当前简历的条目</div>
    </div>
    <div class="p-5">
      <div id="module-area"></div>
    </div>
  </div>
  
  <!-- 右栏：实时预览 -->
  <div class="flex-1 overflow-y-auto bg-neutral-100">
    <div class="bg-white border-b border-neutral-200 sticky top-0 z-10">
      <!-- 第一行：标题 + 缩放 -->
      <div class="px-6 py-2.5 flex items-center justify-between border-b border-neutral-100">
        <div class="text-xs font-semibold text-neutral-500 uppercase tracking-wide">实时预览 · A4</div>
        <div class="flex items-center gap-2 text-xs text-neutral-500">
          <span>缩放</span>
          <input type="range" id="zoom" min="40" max="100" value="65" class="w-24" />
          <span id="zoom-val" class="w-10">65%</span>
        </div>
      </div>
      <!-- 第二行：排版控制 -->
      <div class="px-6 py-2.5 flex items-center gap-5 flex-wrap text-xs">
        <div class="flex items-center gap-2">
          <span class="text-neutral-500 font-medium">页边距</span>
          <div class="flex border border-neutral-200 rounded-md overflow-hidden">
            <button class="margin-btn px-2.5 py-1 hover:bg-neutral-50" data-margin="narrow">窄</button>
            <button class="margin-btn px-2.5 py-1 hover:bg-neutral-50 border-l border-neutral-200" data-margin="normal">中</button>
            <button class="margin-btn px-2.5 py-1 hover:bg-neutral-50 border-l border-neutral-200" data-margin="wide">宽</button>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-neutral-500 font-medium">字号</span>
          <button id="font-down" class="w-6 h-6 border border-neutral-200 rounded hover:bg-neutral-50">−</button>
          <span id="font-val" class="w-12 text-center text-neutral-700">10.5pt</span>
          <button id="font-up" class="w-6 h-6 border border-neutral-200 rounded hover:bg-neutral-50">+</button>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-neutral-500 font-medium">行距</span>
          <button id="line-down" class="w-6 h-6 border border-neutral-200 rounded hover:bg-neutral-50">−</button>
          <span id="line-val" class="w-8 text-center text-neutral-700">1.6</span>
          <button id="line-up" class="w-6 h-6 border border-neutral-200 rounded hover:bg-neutral-50">+</button>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-neutral-500 font-medium">标题样式</span>
          <div class="flex border border-neutral-200 rounded-md overflow-hidden">
            <button class="section-style-btn px-2.5 py-1 hover:bg-neutral-50" data-style="bar" title="左侧蓝色竖条">竖条</button>
            <button class="section-style-btn px-2.5 py-1 hover:bg-neutral-50 border-l border-neutral-200" data-style="line" title="底部横线">横线</button>
            <button class="section-style-btn px-2.5 py-1 hover:bg-neutral-50 border-l border-neutral-200" data-style="plain" title="无装饰">无</button>
          </div>
        </div>
        <button id="reset-style" class="ml-auto text-neutral-400 hover:text-neutral-700 underline-offset-2 hover:underline">重置</button>
      </div>
    </div>
    <div class="p-6 flex justify-center">
      <div class="preview-wrapper" id="preview-wrapper">
        <!-- 多个 .resume-page 会动态插入这里 -->
        <div id="pages-container"></div>
      </div>
    </div>
  </div>
</div>

<!-- 图片裁剪弹窗 -->
<div id="crop-modal" class="hidden fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-6">
  <div class="bg-white rounded-xl max-w-3xl w-full p-6 max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between mb-4 flex-shrink-0">
      <h3 class="text-base font-semibold" id="crop-title">裁剪图片</h3>
      <button id="crop-cancel" class="text-neutral-400 hover:text-neutral-900">✕</button>
    </div>
    
    <!-- 比例选择 -->
    <div class="mb-3 flex items-center gap-3 flex-wrap text-xs flex-shrink-0">
      <span class="text-neutral-500 font-medium">裁剪比例</span>
      <div class="flex border border-neutral-200 rounded-md overflow-hidden" id="ratio-group">
        <!-- 按钮由 JS 动态填充 -->
      </div>
      <span class="text-neutral-400 ml-2" id="ratio-hint"></span>
    </div>
    
    <!-- 裁剪区 -->
    <div class="flex-1 bg-neutral-100 rounded-lg flex items-center justify-center overflow-hidden relative" style="min-height: 350px;">
      <div id="crop-canvas-wrap" class="relative inline-block" style="line-height: 0; overflow: hidden;">
        <img id="crop-img" alt="" style="max-width: 100%; max-height: 60vh; display: block; user-select: none; -webkit-user-drag: none;" />
        <!-- 裁剪框 -->
        <div id="crop-box" class="absolute" style="border: 2px solid #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); cursor: move;">
          <!-- 8 个调整手柄 -->
          <div class="crop-handle" data-dir="nw" style="position:absolute; left:-6px; top:-6px; width:12px; height:12px; background:#fff; border-radius:2px; cursor:nwse-resize;"></div>
          <div class="crop-handle" data-dir="ne" style="position:absolute; right:-6px; top:-6px; width:12px; height:12px; background:#fff; border-radius:2px; cursor:nesw-resize;"></div>
          <div class="crop-handle" data-dir="sw" style="position:absolute; left:-6px; bottom:-6px; width:12px; height:12px; background:#fff; border-radius:2px; cursor:nesw-resize;"></div>
          <div class="crop-handle" data-dir="se" style="position:absolute; right:-6px; bottom:-6px; width:12px; height:12px; background:#fff; border-radius:2px; cursor:nwse-resize;"></div>
        </div>
      </div>
    </div>
    
    <!-- 按钮 -->
    <div class="flex justify-end gap-2 mt-4 flex-shrink-0">
      <button id="crop-cancel-btn" class="btn-secondary">取消</button>
      <button id="crop-confirm" class="btn-primary">确认裁剪</button>
    </div>
  </div>
</div>

<!-- 导入弹窗 -->
<div id="import-modal" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-6">
  <div class="bg-white rounded-xl max-w-2xl w-full p-6 max-h-[85vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-base font-semibold">导入旧简历</h3>
      <button id="close-modal" class="text-neutral-400 hover:text-neutral-900">✕</button>
    </div>
    <p class="text-sm text-neutral-600 mb-4">支持两种方式：</p>
    <div class="space-y-4">
      <div>
        <div class="text-xs font-semibold text-neutral-500 mb-2">方式 1：上传 PDF（自动提取文本）</div>
        <button id="upload-pdf" class="btn-secondary w-full">选择 PDF 文件</button>
      </div>
      <div>
        <div class="text-xs font-semibold text-neutral-500 mb-2">方式 2：粘贴文本</div>
        <textarea id="paste-text" class="field-input field-textarea" style="min-height: 180px;" placeholder="粘贴你的简历文字内容..."></textarea>
      </div>
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-3">
        <div class="text-xs text-blue-900 font-medium mb-1">💡 智能解析说明</div>
        <div class="text-xs text-blue-800">解析器会识别关键词（如"教育经历"、"实习经历"、日期格式、公司/学校名）来自动分配到对应模块。识别后你可以在左侧编辑区微调。</div>
      </div>
      <button id="parse-btn" class="btn-primary w-full">开始解析并填充</button>
    </div>
  </div>
</div>

<!-- PDF.js for parsing uploaded PDFs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>

<script src="app.js"></script>
</body>
</html>
